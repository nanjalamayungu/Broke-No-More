<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fdf6f0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Broke No More">
<meta name="description" content="Your financial friend for international students.">
<title>Broke No More</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="authScreen">
  <div class="auth-flowers">🌸✨🌷</div>
  <div class="auth-logo">Broke<br><span>No More</span></div>
  <div class="auth-tagline">Your financial friend. No jargon. No judgment.</div>
  <div class="auth-card">
    <div class="auth-label">Enter your email to sign in or sign up</div>
    <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" />
    <button class="auth-submit" onclick="sendMagicLink()">Send me a login link 🌸</button>
    <div id="authMsg"></div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="appScreen">

  <!-- Sticky Header -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-logo">Broke <span>No More</span></div>
      <div class="header-right">
        <div class="month-nav">
          <button onclick="prevMonth()">‹</button>
          <span id="monthLabel">May 2025</span>
          <button onclick="nextMonth()">›</button>
        </div>
        <button class="signout-btn" onclick="Auth.signOut()">Sign out</button>
      </div>
    </div>
    <!-- Mood ring bar just below header -->
    <div class="mood-ring">
      <div class="mood-ring-fill" id="moodRing" style="width:0%"></div>
    </div>
  </header>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="shifts"     onclick="switchTab('shifts')">💼 Shifts</button>
    <button class="tab-btn"        data-tab="budget"     onclick="switchTab('budget')">📊 Budget</button>
    <button class="tab-btn"        data-tab="taxes"      onclick="switchTab('taxes')">🧾 Taxes</button>
    <button class="tab-btn"        data-tab="fieldguide" onclick="switchTab('fieldguide')">📖 Field Guide</button>
    <button class="tab-btn"        data-tab="goals"      onclick="switchTab('goals')">🎯 Goals</button>
    <button class="tab-btn"        data-tab="settings"   onclick="switchTab('settings')">⚙️ Settings</button>
  </nav>

  <!-- Content Area -->
  <main class="content-area">
    <div id="tabContent">
      <div class="empty-state">Loading your world… 🌸</div>
    </div>
  </main>

</div>

<!-- Modal Overlay -->
<div id="modalOverlay" onclick="handleOverlayClick(event)">
  <div id="modal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confetti container -->
<div id="confettiContainer"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/tax.js"></script>
<script src="js/persona.js"></script>
<script src="js/app.js"></script>
<script src="js/hours.js"></script>
<script src="js/settings.js"></script>
<script src="js/confetti.js"></script>

<script>
  function prevMonth() {
    State.currentMonth--;
    if (State.currentMonth < 1) { State.currentMonth = 12; State.currentYear--; }
    updateMonthLabel();
    loadMonthData();
  }
  function nextMonth() {
    State.currentMonth++;
    if (State.currentMonth > 12) { State.currentMonth = 1; State.currentYear++; }
    updateMonthLabel();
    loadMonthData();
  }
  function updateMonthLabel() {
    const d = new Date(State.currentYear, State.currentMonth - 1);
    document.getElementById('monthLabel').textContent =
      d.toLocaleString('default', { month: 'short', year: 'numeric' });
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.warn);
  }
</script>
</body>
</html>
